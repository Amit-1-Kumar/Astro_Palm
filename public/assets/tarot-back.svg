<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#140A26"/>
      <stop offset="100%" stop-color="#0B0D17"/>
    </linearGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#40E0D0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#140A26" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <rect width="200" height="300" rx="16" fill="url(#cardBg)" stroke="#8A2BE2" stroke-width="2"/>
  
  <!-- Intricate borders -->
  <rect x="10" y="10" width="180" height="280" rx="10" fill="none" stroke="#40E0D0" stroke-width="1" stroke-dasharray="4 4" opacity="0.6"/>
  <rect x="20" y="20" width="160" height="260" rx="6" fill="none" stroke="#EE82EE" stroke-width="1" opacity="0.4"/>
  
  <!-- Central Eye / Star Motif -->
  <circle cx="100" cy="150" r="30" fill="url(#starGlow)" />
  <path d="M70 150 Q 100 120 130 150 Q 100 180 70 150 Z" fill="none" stroke="#E0FFFF" stroke-width="2"/>
  <circle cx="100" cy="150" r="10" fill="#40E0D0"/>
  
  <!-- Moon shapes -->
  <path d="M40 50 A 20 20 0 1 1 60 70 A 15 15 0 1 0 40 50 Z" fill="#EE82EE" opacity="0.7"/>
  <path d="M160 250 A 20 20 0 1 1 140 230 A 15 15 0 1 0 160 250 Z" fill="#EE82EE" opacity="0.7"/>
  
  <!-- Diamond shapes -->
  <polygon points="100,30 110,50 100,70 90,50" fill="#40E0D0" opacity="0.8"/>
  <polygon points="100,230 110,250 100,270 90,250" fill="#40E0D0" opacity="0.8"/>
</svg>
